name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings

  validators:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python scripts/complete_phase1_wos.py
      - run: python scripts/complete_stub_wos.py

  integration:
    runs-on: ubuntu-latest
    needs: [typescript, rust]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rarecrest
          POSTGRES_PASSWORD: rarecrest_dev
          POSTGRES_DB: rarecrest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rarecrest -d rarecrest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm --filter @rarecrest/contracts build
      - run: pnpm --filter @rarecrest/db build
      - name: Bootstrap database schema
        env:
          DATABASE_URL: postgresql://rarecrest:rarecrest_dev@localhost:5432/rarecrest
          PGPASSWORD: rarecrest_dev
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client > /dev/null
          psql "$DATABASE_URL" -f scripts/ci-db-bootstrap.sql
      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://rarecrest:rarecrest_dev@localhost:5432/rarecrest
        run: node packages/db/dist/migrate.js
      - name: Stack smoke
        env:
          DATABASE_URL: postgresql://rarecrest:rarecrest_dev@localhost:5432/rarecrest
        run: node scripts/stack-smoke.mjs
